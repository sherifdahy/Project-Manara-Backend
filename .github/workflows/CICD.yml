name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:   ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER:      manaraa-cluster
  ECS_SERVICE:      manaraa-service
  ECS_TASK_FAMILY:  manaraa-task
  CONTAINER_NAME:   manaraa-container

permissions:
  id-token: write
  contents: read

jobs:

  # ================================================================
  # STAGE 1 — DETECT + RESTORE
  # ================================================================
  install:
    name: "📦 Stage 1 — Detect & Restore"
    runs-on: ubuntu-latest
    outputs:
      solution_path: ${{ steps.detect.outputs.solution_path }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 💾 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: 🔎 Show repo structure
        run: find . -maxdepth 5 \( -name "*.sln" -o -name "*.csproj" \)

      - name: 🧠 Detect solution/project file
        id: detect
        run: |
          FILE=$(find . -maxdepth 5 -name "*.sln" | head -n 1)
          if [ -z "$FILE" ]; then
            FILE=$(find . -maxdepth 5 -name "*.csproj" | head -n 1)
          fi
          if [ -z "$FILE" ]; then
            echo "❌ No .sln or .csproj found"
            exit 1
          fi
          echo "✅ Using: $FILE"
          echo "solution_path=$FILE" >> $GITHUB_OUTPUT

      - name: 📦 Restore packages
        run: |
          dotnet restore "${{ steps.detect.outputs.solution_path }}" \
            --packages "${{ env.NUGET_PACKAGES }}"

  # ================================================================
  # STAGE 2 — BUILD
  # ================================================================
  build:
    name: "🔨 Stage 2 — Build"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 💾 Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: 🔨 Build app
        run: |
          dotnet build "${{ needs.install.outputs.solution_path }}" \
            --configuration Release \
            -p:RestorePackagesPath="${{ env.NUGET_PACKAGES }}"

  # ================================================================
  # STAGE 3 — TEST (never blocks pipeline)
  # ================================================================
  test:
    name: "🧪 Stage 3 — Test"
    needs: [install, build]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 💾 Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: 🧪 Run tests
        continue-on-error: true
        run: |
          dotnet test "${{ needs.install.outputs.solution_path }}" \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            -p:RestorePackagesPath="${{ env.NUGET_PACKAGES }}" || true

  # ================================================================
  # STAGE 3b — SONARQUBE ANALYSIS (report-only, fully parallel/isolated)
  #  • Depends ONLY on `install` — runs alongside build/test/docker-push
  #  • continue-on-error at job level — can NEVER fail the workflow
  #  • Uses .NET-specific scanner (required for C#/VB.NET analysis)
  #  • Builds ALL projects in a single temporary solution so the scanner
  #    instruments every project in one MSBuild graph
  #  • .NET 8 SDK is installed alongside .NET 10 because the
  #    sonarscanner tool itself targets net8
  # ================================================================
  sonarqube:
    name: "🔍 Stage 3b — SonarQube Analysis (report-only)"
    needs: install
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ⚙️ Setup .NET (8 for scanner tool + 10 for build)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java (required by the Sonar scanner engine)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 💾 Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: 🌐 Verify SonarQube server reachability
        continue-on-error: true
        run: |
          echo "Pinging https://sonar.manaraa.tech ..."
          curl -sSf -o /dev/null -w "HTTP %{http_code}\n" https://sonar.manaraa.tech || \
            echo "⚠️ Sonar server not reachable from runner"

      - name: 📦 Install latest dotnet-sonarscanner
        run: |
          rm -rf ./.sonar
          mkdir -p ./.sonar/scanner
          dotnet tool install dotnet-sonarscanner --tool-path ./.sonar/scanner
          echo "✅ Installed dotnet-sonarscanner:"
          dotnet tool list --tool-path ./.sonar/scanner

      - name: 🧠 Create temporary solution containing every project
        run: |
          dotnet new sln -n Manara
          find . -maxdepth 5 -name "*.csproj" -print0 | \
            xargs -0 -I{} dotnet sln Manara.sln add "{}"
          echo "Projects in solution:"
          dotnet sln Manara.sln list

      - name: 📦 Restore packages (whole solution)
        run: |
          dotnet restore Manara.sln --packages "${{ env.NUGET_PACKAGES }}"

      - name: 🔍 Begin SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "❌ SONAR_TOKEN secret is missing/empty."
            exit 0
          fi
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"manaraa-backend" \
            /n:"Manara Backend" \
            /v:"${{ github.sha }}" \
            /d:sonar.host.url="https://sonar.manaraa.tech" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/Migrations/**,**/*.Designer.cs" \
            /d:sonar.qualitygate.wait=false \
            /d:sonar.scanner.scanAll=false

      - name: 🔨 Build for analysis (single solution build)
        run: |
          dotnet build Manara.sln \
            --configuration Release \
            --no-restore \
            -p:RestorePackagesPath="${{ env.NUGET_PACKAGES }}"

      - name: ✅ End SonarQube analysis (uploads results)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "❌ Skipping end step — SONAR_TOKEN missing."
            exit 0
          fi
          ./.sonar/scanner/dotnet-sonarscanner end \
            /d:sonar.token="$SONAR_TOKEN"

  # ================================================================
  # STAGE 4 — DOCKER BUILD + PUSH TO ECR
  # ================================================================
  docker-push:
    name: "🐳 Stage 4 — Docker Build & Push ECR"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🔎 Detect API project path
        id: api
        run: |
          set -e
          FILE=$(find . -maxdepth 6 -name "*.csproj" \
            | grep -Ei '/app\.api/|/api/' \
            | grep -Eiv 'test|tests' \
            | head -n 1)
          if [ -z "$FILE" ]; then
            FILE=$(find . -maxdepth 6 -name "*.csproj" | grep -Eiv 'test|tests' | head -n 1)
          fi
          if [ -z "$FILE" ]; then
            echo "❌ Could not find a publishable .csproj"
            exit 1
          fi
          echo "✅ API project: $FILE"
          DLL="$(basename "$FILE" .csproj).dll"
          echo "✅ DLL name: $DLL"
          echo "api_path=$FILE" >> $GITHUB_OUTPUT
          echo "dll_name=$DLL"  >> $GITHUB_OUTPUT

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 🔑 Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 📤 Build & Push image
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          FULL_URI=$REGISTRY/${{ env.ECR_REPOSITORY }}
          echo "🏷️ Image tag: $TAG"
          docker build \
            --build-arg PROJECT_PATH="${{ steps.api.outputs.api_path }}" \
            --build-arg DLL_NAME="${{ steps.api.outputs.dll_name }}" \
            -t $FULL_URI:$TAG \
            -t $FULL_URI:latest .
          docker push $FULL_URI:$TAG
          docker push $FULL_URI:latest
          echo "✅ Pushed: $FULL_URI:$TAG"

  # ================================================================
  # STAGE 5 — DEPLOY TO ECS
  # ================================================================
  deploy:
    name: "🚀 Stage 5 — Deploy ECS"
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 🚀 Update task definition & deploy
        run: |
          echo "📥 Getting current task definition..."
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition)
          echo "📋 Old image:"
          echo $TASK_DEF | jq -r '.containerDefinitions[0].image'

          # Get the latest image URI from ECR
          REGISTRY=$(aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --query 'repositories[0].repositoryUri' \
            --output text)
          NEW_TAG=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
            --output text)
          FULL_IMAGE="$REGISTRY:$NEW_TAG"
          echo "🆕 New image: $FULL_IMAGE"

          # Build new task def JSON: swap image + remove AWS-managed fields
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMG "$FULL_IMAGE" \
            '.containerDefinitions[0].image = $IMG |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .compatibilities,
                 .registeredAt, .registeredBy)')

          # Register new revision
          echo "📝 Registering new task definition revision..."
          aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF"

          # Update service with new revision
          echo "🚀 Updating ECS service..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --force-new-deployment

          echo "⏳ Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}

          echo "✅ Service is stable with the new image!"

  # ================================================================
  # STAGE 6 — VERIFY
  # ================================================================
  verify:
    name: "✅ Stage 6 — Verify"
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 📊 Deployment summary
        run: |
          SERVICE=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0]')
          RUNNING=$(echo $SERVICE | jq -r '.runningCount')
          DESIRED=$(echo $SERVICE | jq -r '.desiredCount')
          TASK_DEF=$(echo $SERVICE | jq -r '.taskDefinition')
          STATUS=$(echo $SERVICE | jq -r '.status')

          # Get the image from the active task definition
          IMAGE=$(aws ecs describe-task-definition \
            --task-definition $TASK_DEF \
            --query 'taskDefinition.containerDefinitions[0].image' \
            --output text)

          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║        DEPLOYMENT SUMMARY                ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  Status   : $STATUS"
          echo "║  Running  : $RUNNING / $DESIRED"
          echo "║  Task Def : $TASK_DEF"
          echo "║  Image    : $IMAGE"
          echo "║  Commit   : ${{ github.sha }}"
          echo "╚══════════════════════════════════════════╝"

          if [ "$RUNNING" -eq "$DESIRED" ] && [ "$STATUS" == "ACTIVE" ]; then
            echo "✅ Deployment successful!"
          else
            echo "⚠️ Warning: Running ($RUNNING) != Desired ($DESIRED)"
          fi

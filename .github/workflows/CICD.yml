# ================================================================
# CI/CD Pipeline — .NET Backend → Docker → ECR → ECS Fargate
# FIXED: Auto-detect real .sln / .csproj instead of hardcoded App.sln
# ================================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"

  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

  ECS_CLUSTER: myapp-cluster
  ECS_SERVICE: myapp-service
  ECS_TASK_FAMILY: myapp-task
  CONTAINER_NAME: myapp-container

permissions:
  id-token: write
  contents: read

jobs:

# ================================================================
# STAGE 1 — DETECT PROJECT + RESTORE
# ================================================================
  install:
    name: "📦 Stage 1 — Detect & Restore"
    runs-on: ubuntu-latest

    outputs:
      solution_path: ${{ steps.detect.outputs.solution_path }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 🔎 Show repo structure
        run: |
          pwd
          ls -la
          find . -maxdepth 5 \( -name "*.sln" -o -name "*.csproj" \)

      # ==========================================================
      # AUTO FIX:
      # 1) Prefer first .sln found
      # 2) If no .sln found, use first .csproj
      # ==========================================================
      - name: 🧠 Detect solution/project file
        id: detect
        run: |
          FILE=$(find . -maxdepth 5 -name "*.sln" | head -n 1)

          if [ -z "$FILE" ]; then
            FILE=$(find . -maxdepth 5 -name "*.csproj" | head -n 1)
          fi

          if [ -z "$FILE" ]; then
            echo "❌ No .sln or .csproj found"
            exit 1
          fi

          echo "✅ Using: $FILE"
          echo "solution_path=$FILE" >> $GITHUB_OUTPUT

      - name: 📦 Restore packages
        run: dotnet restore "${{ steps.detect.outputs.solution_path }}"

# ================================================================
# STAGE 2 — BUILD
# ================================================================
  build:
    name: "🔨 Stage 2 — Build"
    needs: install
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 🔨 Build app
        run: |
          dotnet build "${{ needs.install.outputs.solution_path }}" \
            --configuration Release \
            --no-restore

# ================================================================
# STAGE 3 — TEST
# ================================================================
  test:
    name: "🧪 Stage 3 — Test"
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 🧪 Run tests
        continue-on-error: true
        run: |
          dotnet test "${{ needs.install.outputs.solution_path }}" \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" || true

# ================================================================
# STAGE 4 — DOCKER BUILD
# ================================================================
  docker-build:
    name: "🐳 Stage 4 — Docker Build"
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: 🏷️ Generate tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: 🐳 Build image
        run: |
          docker build \
            -t myapp-backend:${{ steps.meta.outputs.image_tag }} \
            -t myapp-backend:latest .

# ================================================================
# STAGE 5 — PUSH TO ECR
# ================================================================
  push-to-ecr:
    name: "☁️ Stage 5 — Push ECR"
    needs: docker-build
    runs-on: ubuntu-latest

    outputs:
      full_image_uri: ${{ steps.push.outputs.full_image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 📤 Push image
        id: push
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
          TAG: ${{ needs.docker-build.outputs.image_tag }}
        run: |
          FULL_URI=$REGISTRY/${{ env.ECR_REPOSITORY }}

          docker build -t $FULL_URI:$TAG -t $FULL_URI:latest .

          docker push $FULL_URI:$TAG
          docker push $FULL_URI:latest

          echo "full_image_uri=$FULL_URI:$TAG" >> $GITHUB_OUTPUT

# ================================================================
# STAGE 6 — DEPLOY TO ECS
# ================================================================
  deploy:
    name: "🚀 Stage 6 — Deploy ECS"
    needs: push-to-ecr
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🚀 Force new deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

# ================================================================
# STAGE 7 — VERIFY
# ================================================================
  verify:
    name: "✅ Stage 7 — Verify"
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📊 Check ECS service
        run: |
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}

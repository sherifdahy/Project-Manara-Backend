# ================================================================
# CI/CD Pipeline — .NET Backend → Docker → ECR → ECS Fargate
# ================================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:   ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER:      manaraa-cluster
  ECS_SERVICE:      manaraa-service
  ECS_TASK_FAMILY:  manaraa-task
  CONTAINER_NAME:   manaraa-container

permissions:
  id-token: write
  contents: read

# ================================================================
# STAGE 1 — DETECT + RESTORE
# ================================================================
jobs:
  install:
    name: "📦 Stage 1 — Detect & Restore"
    runs-on: ubuntu-latest

    outputs:
      solution_path: ${{ steps.detect.outputs.solution_path }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 💾 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: 🔎 Show repo structure
        run: find . -maxdepth 5 \( -name "*.sln" -o -name "*.csproj" \)

      - name: 🧠 Detect solution/project file
        id: detect
        run: |
          FILE=$(find . -maxdepth 5 -name "*.sln" | head -n 1)
          if [ -z "$FILE" ]; then
            FILE=$(find . -maxdepth 5 -name "*.csproj" | head -n 1)
          fi
          if [ -z "$FILE" ]; then
            echo "❌ No .sln or .csproj found"
            exit 1
          fi
          echo "✅ Using: $FILE"
          echo "solution_path=$FILE" >> $GITHUB_OUTPUT

      - name: 📦 Restore packages
        run: |
          dotnet restore "${{ steps.detect.outputs.solution_path }}" \
            --packages "${{ env.NUGET_PACKAGES }}"

# ================================================================
# STAGE 2 — BUILD
# ================================================================
  build:
    name: "🔨 Stage 2 — Build"
    needs: install
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 💾 Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: 🔨 Build app
        run: |
          dotnet build "${{ needs.install.outputs.solution_path }}" \
            --configuration Release \
            -p:RestorePackagesPath="${{ env.NUGET_PACKAGES }}"

# ================================================================
# STAGE 3 — TEST
# ================================================================
  test:
    name: "🧪 Stage 3 — Test"
    needs: [install, build]
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 💾 Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: 🧪 Run tests
        continue-on-error: true
        run: |
          dotnet test "${{ needs.install.outputs.solution_path }}" \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            -p:RestorePackagesPath="${{ env.NUGET_PACKAGES }}" || true

# ================================================================
# STAGE 4 — DOCKER BUILD + PUSH TO ECR
# ================================================================
  docker-push:
    name: "🐳 Stage 4 — Docker Build & Push ECR"
    needs: test
    runs-on: ubuntu-latest

    outputs:
      full_image_uri: ${{ steps.push.outputs.full_image_uri }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: 🔎 Detect API project path
        id: api
        run: |
          set -e

          FILE=$(find . -maxdepth 6 -name "*.csproj" \
            | grep -Ei '/app\.api/|/api/' \
            | grep -Eiv 'test|tests' \
            | head -n 1)

          if [ -z "$FILE" ]; then
            FILE=$(find . -maxdepth 6 -name "*.csproj" | grep -Eiv 'test|tests' | head -n 1)
          fi

          if [ -z "$FILE" ]; then
            echo "❌ Could not find a publishable .csproj"
            exit 1
          fi

          echo "✅ API project: $FILE"
          DLL="$(basename "$FILE" .csproj).dll"
          echo "✅ DLL name: $DLL"

          echo "api_path=$FILE"  >> $GITHUB_OUTPUT
          echo "dll_name=$DLL"   >> $GITHUB_OUTPUT

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 🔑 Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 📤 Build & Push image
        id: push
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
          TAG:      ${{ steps.meta.outputs.image_tag }}
        run: |
          FULL_URI=$REGISTRY/${{ env.ECR_REPOSITORY }}

          docker build \
            --build-arg PROJECT_PATH="${{ steps.api.outputs.api_path }}" \
            --build-arg DLL_NAME="${{ steps.api.outputs.dll_name }}" \
            -t $FULL_URI:$TAG \
            -t $FULL_URI:latest .

          docker push $FULL_URI:$TAG
          docker push $FULL_URI:latest

          echo "full_image_uri=$FULL_URI:$TAG" >> $GITHUB_OUTPUT

# ================================================================
# STAGE 5 — DEPLOY TO ECS  ✅ THIS IS WHERE THE FIX IS
# ================================================================
  deploy:
    name: "🚀 Stage 5 — Deploy ECS"
    needs: docker-push
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 📋 Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: 🖊️ Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-definition.json
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ needs.docker-push.outputs.full_image_uri }}

      - name: 🚀 Register & deploy new task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:          ${{ steps.render-task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

# ================================================================
# STAGE 6 — VERIFY
# ================================================================
  verify:
    name: "✅ Stage 6 — Verify"
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 📊 Check ECS service status
        run: |
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount,TaskDef:taskDefinition}' \
            --output table

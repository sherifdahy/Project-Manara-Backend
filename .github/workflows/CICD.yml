# ================================================================
#  CI/CD Pipeline — .NET 10 Backend → Docker → ECR → ECS Fargate
# ================================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: myapp-cluster
  ECS_SERVICE: myapp-service
  ECS_TASK_FAMILY: myapp-task
  CONTAINER_NAME: myapp-container

permissions:
  id-token: write
  contents: read

jobs:

  # ╔════════════════════════════════════════════╗
  # ║  STAGE 1: INSTALL DEPENDENCIES             ║
  # ╚════════════════════════════════════════════╝
  install:
    name: "📦 Stage 1 — Clone & Install Dependencies"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "⚙️ Setup .NET SDK ${{ env.DOTNET_VERSION }}"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📦 Restore NuGet packages"
        run: dotnet restore

      - name: "💾 Cache restored packages for next stages"
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.nuget/packages
            **/obj
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}

  # ╔════════════════════════════════════════════╗
  # ║  STAGE 2: BUILD THE APPLICATION            ║
  # ╚════════════════════════════════════════════╝
  build:
    name: "🔨 Stage 2 — Build Application"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "⚙️ Setup .NET SDK"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📦 Restore cached packages"
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.nuget/packages
            **/obj
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}

      - name: "🔨 Build in Release mode"
        run: dotnet build --configuration Release --no-restore

  # ╔════════════════════════════════════════════╗
  # ║  STAGE 3: RUN TESTS (non-blocking)         ║
  # ╚════════════════════════════════════════════╝
  test:
    name: "🧪 Stage 3 — Run Tests"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "⚙️ Setup .NET SDK"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📦 Restore cached packages"
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.nuget/packages
            **/obj
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}

      - name: "🔨 Build for testing"
        run: dotnet build --configuration Release --no-restore

      - name: "🧪 Run tests"
        id: run-tests
        continue-on-error: true   # ← NEVER kills the pipeline
        run: |
          # Find all test projects
          TEST_PROJECTS=$(find . -name "*.Tests.csproj" -o -name "*.Test.csproj" -o -name "*Tests.csproj" | head -20)

          if [ -z "$TEST_PROJECTS" ]; then
            echo "::warning::⚠️ No test projects found. Skipping tests."
            echo "test_result=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found test projects:"
          echo "$TEST_PROJECTS"

          dotnet test --configuration Release --no-build --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" || true

          echo "test_result=executed" >> $GITHUB_OUTPUT

      - name: "📋 Test Summary"
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" == "failure" ]; then
            echo "::warning::⚠️ Tests failed but pipeline will continue. Review test results above."
          elif [ "${{ steps.run-tests.outputs.test_result }}" == "skipped" ]; then
            echo "::warning::⚠️ No test projects found. Consider adding tests in the future."
          else
            echo "✅ All tests passed successfully."
          fi

  # ╔════════════════════════════════════════════╗
  # ║  STAGE 4: BUILD DOCKER IMAGE               ║
  # ╚════════════════════════════════════════════╝
  docker-build:
    name: "🐳 Stage 4 — Build Docker Image"
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🏷️ Generate image tag"
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "📌 Image tag: $IMAGE_TAG"

      - name: "🐳 Build Docker image"
        run: |
          docker build \
            --tag myapp-backend:${{ steps.meta.outputs.image_tag }} \
            --tag myapp-backend:latest \
            --file Dockerfile \
            .

      - name: "✅ Verify image was created"
        run: |
          docker images myapp-backend
          echo "✅ Docker image built successfully."

  # ╔════════════════════════════════════════════╗
  # ║  STAGE 5: PUSH TO ECR                      ║
  # ╚════════════════════════════════════════════╝
  push-to-ecr:
    name: "☁️ Stage 5 — Push Image to ECR"
    needs: docker-build
    runs-on: ubuntu-latest
    outputs:
      full_image_uri: ${{ steps.push.outputs.full_image_uri }}
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🔐 Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "🔑 Login to Amazon ECR"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "🐳 Build & Push Docker image to ECR"
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.docker-build.outputs.image_tag }}
        run: |
          FULL_URI="$ECR_REGISTRY/$ECR_REPOSITORY"

          # Rebuild (uses Docker layer cache) and tag for ECR
          docker build -t $FULL_URI:$IMAGE_TAG -t $FULL_URI:latest .

          # Push both tags
          echo "📤 Pushing $FULL_URI:$IMAGE_TAG ..."
          docker push $FULL_URI:$IMAGE_TAG

          echo "📤 Pushing $FULL_URI:latest ..."
          docker push $FULL_URI:latest

          echo "full_image_uri=$FULL_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "✅ Image pushed to ECR successfully."

  # ╔════════════════════════════════════════════╗
  # ║  STAGE 6: UPDATE ECS TASK DEFINITION        ║
  # ╚════════════════════════════════════════════╝
  update-task-definition:
    name: "📝 Stage 6 — Update ECS Task Definition"
    needs: push-to-ecr
    runs-on: ubuntu-latest
    outputs:
      task_def_file: ${{ steps.render.outputs.task-definition }}
    steps:
      - name: "🔐 Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "📥 Download current task definition from AWS"
        run: |
          echo "📥 Fetching current task definition for '${{ env.ECS_TASK_FAMILY }}'..."
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

          echo "✅ Current task definition downloaded."
          cat task-definition.json | head -20

      - name: "🔄 Render new image into task definition"
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.push-to-ecr.outputs.full_image_uri }}

  # ╔════════════════════════════════════════════╗
  # ║  STAGE 7: DEPLOY TO ECS / FARGATE           ║
  # ╚════════════════════════════════════════════╝
  deploy:
    name: "🚀 Stage 7 — Deploy to ECS Fargate"
    needs: update-task-definition
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: "🔐 Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "🚀 Deploy new task definition to ECS"
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ needs.update-task-definition.outputs.task_def_file }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ╔════════════════════════════════════════════╗
  # ║  STAGE 8: VERIFY DEPLOYMENT                 ║
  # ╚════════════════════════════════════════════╝
  verify:
    name: "✅ Stage 8 — Verify Deployment"
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: "🔐 Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "🔍 Check ECS service status"
        run: |
          echo "🔍 Checking ECS service status..."

          SERVICE_JSON=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0]')

          RUNNING=$(echo $SERVICE_JSON | jq -r '.runningCount')
          DESIRED=$(echo $SERVICE_JSON | jq -r '.desiredCount')
          STATUS=$(echo $SERVICE_JSON | jq -r '.status')

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Service Status : $STATUS"
          echo "  Desired Tasks  : $DESIRED"
          echo "  Running Tasks  : $RUNNING"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$RUNNING" -eq "$DESIRED" ] && [ "$STATUS" == "ACTIVE" ]; then
            echo "✅ Deployment verified! $RUNNING/$DESIRED tasks running."
          else
            echo "::warning::⚠️ Running count ($RUNNING) does not match desired ($DESIRED)."
          fi

      - name: "🏥 Check target group health"
        run: |
          echo "🏥 Checking ALB target group health..."

          # Get the target group ARN from the service
          TG_ARN=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].loadBalancers[0].targetGroupArn' \
            --output text)

          if [ "$TG_ARN" != "None" ] && [ -n "$TG_ARN" ]; then
            HEALTH=$(aws elbv2 describe-target-health \
              --target-group-arn $TG_ARN \
              --query 'TargetHealthDescriptions[*].TargetHealth.State' \
              --output text)
            echo "  Target health: $HEALTH"
          else
            echo "  No load balancer attached (or still registering)."
          fi

      - name: "📊 Deployment Summary"
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║     🎉 DEPLOYMENT COMPLETE               ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  Cluster  : ${{ env.ECS_CLUSTER }}       "
          echo "║  Service  : ${{ env.ECS_SERVICE }}       "
          echo "║  Image    : ${{ needs.push-to-ecr.outputs.full_image_uri || 'see Stage 5' }}"
          echo "║  Commit   : ${{ github.sha }}            "
          echo "║  Branch   : ${{ github.ref_name }}       "
          echo "╚══════════════════════════════════════════╝"
